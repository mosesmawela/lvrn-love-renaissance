<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>LVRN - Love Renaissance</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
      @import url('https://api.fontshare.com/v2/css?f[]=clash-display@400,500,600,700&f[]=satoshi@400,500,700&display=swap');
      @import url('https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Playfair+Display:ital,wght@0,400..900;1,400..900&family=Cormorant+Garamond:ital,wght@0,300..700;1,300..700&family=Libre+Baskerville:ital,wght@0,400;0,700;1,400&family=Fraunces:ital,opsz,wght@0,9..144,100..900;1,9..144,100..900&display=swap');
      
      :root {
        /* Refined Luxury Dark */
        --bg-color: #0a0a0a;
        --text-color: #fafafa;
        --text-secondary: #a3a3a3;
        --text-muted: #525252;
        --card-bg: rgba(250, 250, 250, 0.015);
        --card-border: 1px solid rgba(250, 250, 250, 0.08);
        --card-radius: 0;
        --btn-radius: 0;
        --input-bg: rgba(250, 250, 250, 0.03);
        --input-border: 1px solid rgba(250, 250, 250, 0.1);
        --spotlight-opacity: 0.9;
        --spotlight-rgb: 255, 255, 255;
        --font-display: 'Clash Display', sans-serif;
        --font-body: 'Satoshi', sans-serif;
        --font-serif: 'Instrument Serif', serif;
        --accent: #f97316;
        --accent-glow: rgba(249, 115, 22, 0.4);
        --gradient-start: #f97316;
        --gradient-end: #fb923c;
        --nav-bg: rgba(10, 10, 10, 0.85);
        --logo-filter: invert(1);
        --text-inverse: #0a0a0a;
      }

      /* Refined Light */
      body.theme-light {
        --bg-color: #fafafa;
        --text-color: #0a0a0a;
        --text-secondary: #525252;
        --text-muted: #a3a3a3;
        --card-bg: rgba(10, 10, 10, 0.02);
        --card-border: 1px solid rgba(10, 10, 10, 0.06);
        --input-bg: rgba(10, 10, 10, 0.02);
        --input-border: 1px solid rgba(10, 10, 10, 0.1);
        --spotlight-opacity: 0.08;
        --spotlight-rgb: 0, 0, 0;
        --accent: #ea580c;
        --accent-glow: rgba(234, 88, 12, 0.3);
        --gradient-start: #0a0a0a;
        --gradient-end: #525252;
        --nav-bg: rgba(250, 250, 250, 0.85);
        --logo-filter: none;
        --text-inverse: #fafafa;
      }
      
      body {
        font-family: var(--font-body);
        background-color: var(--bg-color);
        color: var(--text-color);
        overflow-x: hidden;
        transition: background-color 0.5s cubic-bezier(0.4, 0, 0.2, 1), color 0.5s cubic-bezier(0.4, 0, 0.2, 1);
      }
      
      /* Film Grain Overlay */
      .noise-overlay {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        pointer-events: none;
        z-index: 9999;
        opacity: 0.03;
        background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.65' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)'/%3E%3C/svg%3E");
      }

      /* Custom scrollbar */
      ::-webkit-scrollbar {
        width: 6px;
      }
      ::-webkit-scrollbar-track {
        background: transparent;
      }
      ::-webkit-scrollbar-thumb {
        background: var(--text-muted);
        border-radius: 3px;
      }
      ::-webkit-scrollbar-thumb:hover {
        background: var(--text-secondary);
      }

      .glass-panel {
        background: var(--card-bg) !important;
        backdrop-filter: blur(20px);
        -webkit-backdrop-filter: blur(20px);
        border: var(--card-border) !important;
        border-radius: var(--card-radius) !important;
        transition: transform 0.4s cubic-bezier(0.25, 0.46, 0.45, 0.94), box-shadow 0.4s cubic-bezier(0.25, 0.46, 0.45, 0.94);
        box-shadow: 0 0 0 1px rgba(250, 250, 250, 0.03);
      }
      
      .glass-panel:hover {
        box-shadow: 0 0 40px var(--accent-glow), 0 0 0 1px var(--accent);
      }
      
      .btn-luxury {
        background: var(--accent);
        color: var(--text-inverse);
        padding: 1rem 2.5rem;
        font-family: var(--font-display);
        font-weight: 600;
        letter-spacing: 0.05em;
        text-transform: uppercase;
        border: none;
        cursor: pointer;
        position: relative;
        overflow: hidden;
      }
      
      .btn-luxury::before {
        content: '';
        position: absolute;
        top: 0;
        left: -100%;
        width: 100%;
        height: 100%;
        background: linear-gradient(90deg, transparent, rgba(255,255,255,0.3), transparent);
        transition: left 0.5s;
      }
      
      .btn-luxury:hover::before {
        left: 100%;
      }
      
      .gradient-text {
        background: linear-gradient(135deg, var(--gradient-start) 0%, var(--gradient-end) 100%);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
      }
      
      .display-heading {
        font-family: var(--font-display);
        font-weight: 700;
        line-height: 0.95;
        letter-spacing: -0.02em;
      }
      
      .serif-heading {
        font-family: var(--font-serif);
        font-weight: 400;
        font-style: italic;
        line-height: 1.1;
      }
      
      .label-text {
        font-family: var(--font-body);
        font-size: 0.7rem;
        font-weight: 500;
        text-transform: uppercase;
        letter-spacing: 0.2em;
        color: var(--text-muted);
      }
      
      .accent-line {
        width: 3rem;
        height: 1px;
        background: var(--accent);
      }
      
      /* Input helpers */
      .theme-input {
        background-color: var(--input-bg);
        border: var(--input-border);
        color: var(--text-color);
      }
      .theme-input::placeholder {
        color: var(--text-muted);
      }

      /* Selection */
      ::selection {
        background: var(--accent);
        color: white;
      }
    </style>
  <script type="importmap">
{
  "imports": {
    "lucide-react": "https://esm.sh/lucide-react@^0.561.0",
    "react-dom/": "https://esm.sh/react-dom@^19.2.3/",
    "react/": "https://esm.sh/react@^19.2.3/",
    "react": "https://esm.sh/react@^19.2.3",
    "framer-motion": "https://esm.sh/framer-motion@^12.23.26",
    "@google/genai": "https://esm.sh/@google/genai@^1.34.0",
    "three": "https://esm.sh/three@0.160.0",
    "three/addons/": "https://esm.sh/three@0.160.0/examples/jsm/",
    "three/": "https://esm.sh/three@^0.182.0/"
  }
}
</script>
<link rel="stylesheet" href="/index.css">
</head>
  <body>
    <div class="noise-overlay"></div>
    <div id="root"></div>
  <script type="module" src="/index.tsx"></script>
</body>
</html>
