<!DOCTYPE html>
<html lang="en" class="scroll-smooth">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>LVRN - Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;900&display=swap');
        @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&display=swap');

        :root {
            /* Defaults (Modern Dark) */
            --bg-color: #050505;
            --text-color: #ffffff;
            --text-secondary: #a1a1aa;
            --text-muted: #52525b;
            --card-bg: rgba(255, 255, 255, 0.02);
            --card-border: 1px solid rgba(255, 255, 255, 0.05);
            --card-radius: 1.5rem;
            --btn-radius: 9999px;
            --input-bg: rgba(255, 255, 255, 0.03);
            --input-border: 1px solid rgba(255, 255, 255, 0.08);
            --spotlight-opacity: 0.8;
            --spotlight-rgb: 255, 255, 255;
            --font-main: 'Inter', sans-serif;
            --accent: #a855f7;
            --gradient-start: #fff;
            --gradient-end: #a1a1aa;
            --nav-bg: rgba(5, 5, 5, 0.6);
            --logo-filter: invert(1);
        }

        /* Modern Light - Improved Contrast */
        body.theme-light {
            --bg-color: #f8fafc;
            --text-color: #0f172a;
            --text-secondary: #64748b;
            --text-muted: #94a3b8;
            --card-bg: rgba(255, 255, 255, 0.6);
            --card-border: 1px solid rgba(0, 0, 0, 0.04);
            --input-bg: #ffffff;
            --input-border: 1px solid #e2e8f0;
            --spotlight-opacity: 0.05;
            --spotlight-rgb: 0, 0, 0;
            --accent: #7c3aed;
            --gradient-start: #1e293b;
            --gradient-end: #64748b;
            --nav-bg: rgba(255, 255, 255, 0.7);
            --logo-filter: none;
        }

        body {
            font-family: var(--font-main);
            background-color: var(--bg-color);
            color: var(--text-color);
            overflow-x: hidden;
            transition: background-color 0.5s cubic-bezier(0.4, 0, 0.2, 1), color 0.5s cubic-bezier(0.4, 0, 0.2, 1);
        }

        /* Film Grain Overlay */
        .noise-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 9999;
            opacity: 0.03;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.65' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)'/%3E%3C/svg%3E");
        }

        /* Custom scrollbar */
        ::-webkit-scrollbar {
            width: 6px;
        }

        ::-webkit-scrollbar-track {
            background: transparent;
        }

        ::-webkit-scrollbar-thumb {
            background: var(--text-muted);
            border-radius: 3px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: var(--text-secondary);
        }

        .glass-panel {
            background: var(--card-bg) !important;
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: var(--card-border) !important;
            border-radius: var(--card-radius) !important;
            transition: transform 0.4s cubic-bezier(0.25, 0.46, 0.45, 0.94), box-shadow 0.4s cubic-bezier(0.25, 0.46, 0.45, 0.94);
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.1);
        }

        .gradient-text {
            background: linear-gradient(135deg, var(--gradient-start) 0%, var(--gradient-end) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        /* Input helpers */
        .theme-input {
            background-color: var(--input-bg);
            border: var(--input-border);
            color: var(--text-color);
        }

        .theme-input::placeholder {
            color: var(--text-muted);
        }

        /* Selection */
        ::selection {
            background: var(--accent);
            color: white;
        }
    </style>
    <script type="importmap">
{
  "imports": {
    "lucide-react": "https://esm.sh/lucide-react@^0.561.0",
    "react-dom/": "https://esm.sh/react-dom@^19.2.3/",
    "react/": "https://esm.sh/react@^19.2.3/",
    "react": "https://esm.sh/react@^19.2.3",
    "framer-motion": "https://esm.sh/framer-motion@^12.23.26",
    "@google/genai": "https://esm.sh/@google/genai@^1.34.0",
    "three": "https://esm.sh/three@0.160.0",
    "three/addons/": "https://esm.sh/three@0.160.0/examples/jsm/",
    "three/": "https://esm.sh/three@^0.182.0/"
  }
}
</script>
    <link rel="stylesheet" href="/index.css">
</head>

<body>
    <div class="noise-overlay"></div>
    <div id="root"></div>
    <script type="module" src="/src/dashboard.tsx"></script>
</body>

</html>
